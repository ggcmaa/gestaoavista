<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Dashboards</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="dashboard-frame" src=""></iframe>

    <script>
        // 1. Liste aqui os links públicos/incorporados dos seus dashboards
        const dashboards = [
            "https://app.powerbi.com/reportEmbed?reportId=b36a49a4-e617-4e51-a469-d5570a8c068e&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20",
            "https://app.powerbi.com/reportEmbed?reportId=35103bce-0cdd-4bd2-9b2f-1fda1e280936&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20",
            ""https://valedotijuco-my.sharepoint.com/personal/gente_gestao_cmaa_ind_br/_layouts/15/embed.aspx?UniqueId=f7ee155d-c08e-4ecf-98f6-878c1d79b2e5",
            ""https://valedotijuco-my.sharepoint.com/personal/gente_gestao_cmaa_ind_br/_layouts/15/embed.aspx?UniqueId=03c412d6-d1b9-49da-b2c1-5d419a0aa43a",
        ];

        // 2. Tempo de transição em milissegundos (ex: 30000 = 30 segundos)
        const tempoTroca = 30000; 
        
        let indiceAtual = 0;
        const frame = document.getElementById('dashboard-frame');

        function rotacionarDashboard() {
            frame.src = dashboards[indiceAtual];
            indiceAtual = (indiceAtual + 1) % dashboards.length;
        }

        // Inicia a primeira exibição e define o intervalo
        rotacionarDashboard();
        setInterval(rotacionarDashboard, tempoTroca);
    </script>
</body>
</html>
