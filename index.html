<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Dashboards</title>
    <style>
        /* Garante que o iframe ocupe a tela toda sem bordas */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="dashboard-frame" src=""></iframe>

    <script>
        // 1. Liste aqui APENAS os links (URLs) entre aspas e separados por vírgula
        const dashboards = [
            "https://valedotijuco-my.sharepoint.com/personal/gente_gestao_cmaa_ind_br/_layouts/15/Doc.aspx?sourcedoc={ce3e46ed-f9bb-469e-8885-9f67cf160855}&action=embedview",
            "COLOQUE_OUTRO_LINK_AQUI_SE_TIVER"
        ];

        // 2. Tempo de transição (ex: 30000 = 30 segundos)
        const tempoTroca = 30000; 
        
        let indiceAtual = 0;
        const frame = document.getElementById('dashboard-frame');

        function rotacionarDashboard() {
            // Verifica se o link existe antes de tentar carregar
            if (dashboards.length > 0) {
                frame.src = dashboards[indiceAtual];
                console.log("Carregando:", dashboards[indiceAtual]);
                indiceAtual = (indiceAtual + 1) % dashboards.length;
            }
        }

        // Inicia a primeira exibição
        rotacionarDashboard();

        // Define o intervalo de troca
        setInterval(rotacionarDashboard, tempoTroca);
    </script>
</body>
</html>
