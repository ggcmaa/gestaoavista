<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Dashboards</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="dashboard-frame" src=""></iframe>

    <script>
        // 1. Liste aqui os links públicos/incorporados dos seus dashboards
        const dashboards = [
    <iframe src="https://valedotijuco-my.sharepoint.com/personal/gente_gestao_cmaa_ind_br/_layouts/15/Doc.aspx?sourcedoc={ce3e46ed-f9bb-469e-8885-9f67cf160855}&action=embedview" width="100%" height="450px" frameborder="0" allowfullscreen="true"></iframe>
];

        // 2. Tempo de transição em milissegundos (ex: 10000 = 10 segundos)
        const tempoTroca = 10000; 
        
        let indiceAtual = 0;
        const frame = document.getElementById('dashboard-frame');

        function rotacionarDashboard() {
            frame.src = dashboards[indiceAtual];
            indiceAtual = (indiceAtual + 1) % dashboards.length;
        }

        // Inicia a primeira exibição e define o intervalo
        rotacionarDashboard();
        setInterval(rotacionarDashboard, tempoTroca);
    </script>
</body>
</html>
